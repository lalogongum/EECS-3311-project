version: "3.9"

services:

  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: consulthub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       consulthub
      POSTGRES_USER:     consulthub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-consulthub123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consulthub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consulthub-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/consulthub
      SPRING_DATASOURCE_USERNAME: consulthub
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-consulthub123}
      SPRING_DATASOURCE_DRIVER:   org.postgresql.Driver
      HIBERNATE_DIALECT:          org.hibernate.dialect.PostgreSQLDialect
      GROQ_API_KEY:             ${GROQ_API_KEY:-}
      CORS_ORIGINS:               http://localhost,http://localhost:80,http://frontend:80
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/services || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Nginx Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: consulthub-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
