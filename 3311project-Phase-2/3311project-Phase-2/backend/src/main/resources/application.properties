# Build: 2026-04-04T02:24:17.003412
spring.application.name=consulthub-backend
server.port=8080

# ── Database (PostgreSQL in Docker, H2 for local dev) ─────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:consulthub;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# ── H2 console (dev only, disabled automatically when using Postgres) ──────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── AI / Groq ──────────────────────────────────────────────────────────────────
ai.api.key=${GROQ_API_KEY:}

# ── CORS ───────────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:80,http://frontend:80}

logging.level.com.consulthub=INFO
